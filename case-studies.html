<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Studies - Via Clara</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ========================= DESIGN SYSTEM ========================= */

:root {
    --bg: #F7F3EE;
    --text: #6F6258;
    --accent: #B89B7A;
    --border: #E6DDD4;
    --text-light: #A79F98;
    --shadow: rgba(0,0,0,0.06);
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body {
    font-family: Inter, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    position: relative;
    overflow-x: hidden;
}

/* ========================= WATERMARK ========================= */

body::before {
    content:"";
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-translate(-50%, -50%));
    width: 600px;
    height: 600px;
    background: url('logo.png') no-repeat center;
    background-size: contain;
    opacity: 0.25;
    z-index: 0;
    pointer-events: none;
}

/* ========================= NAV ========================= */

.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(247,243,238,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
}

.nav-container {
    width: 90%;
    max-width: 1300px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
}

/* UPDATED LOGO SECTION */
.logo {
    display: flex;
    align-items: center;
    gap: 20px;
}

.logo img {
    width: 120px;
    height: auto;
}

/* NEW WRAPPER FOR TEXT */
.logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
}

.logo span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    letter-spacing: 3px;
}

.logo-sub {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--text-light);
    margin-top: 2px;
}

/* NAV LINKS */
.nav-links {
    display: flex;
    gap: 25px;
    list-style: none;
    font-size: 14px;
}

.nav-links a {
    text-decoration: none;
    color: var(--text);
}

.nav-links a:hover {
    color: var(--accent);
}

/* ========================= HEADER ========================= */

.page-header {
    text-align: center;
    padding: 120px 20px 60px;
}

.page-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
}

.page-header p {
    color: var(--text-light);
    margin-top: 10px;
}

/* ========================= CASE STUDIES ========================= */

.case-study {
    padding: 80px 0;
    position: relative;
    z-index: 1;
}

.container {
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

.case-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 60px;
}

h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    margin-bottom: 20px;
}

h3 {
    margin-top: 25px;
    margin-bottom: 10px;
}

ul {
    padding-left: 18px;
}

li {
    margin-bottom: 10px;
    color: var(--text-light);
}

/* RESULTS */
.results {
    background: white;
    border: 1px solid var(--border);
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 30px var(--shadow);
}

.metric {
    margin-bottom: 20px;
}

.metric strong {
    font-size: 22px;
    display: block;
}

/* ALT BACKGROUND */
.alt {
    background: #f2ece6;
}

/* CTA */
.cta {
    background: var(--text);
    color: white;
    text-align: center;
    padding: 100px 20px;
}

.cta a {
    display: inline-block;
    margin-top: 20px;
    background: var(--accent);
    padding: 12px 24px;
    color: white;
    border-radius: 8px;
    text-decoration: none;
}

/* FOOTER */
footer {
    padding: 60px 0;
    background: #efe7df;
    text-align: center;
    font-size: 13px;
}

@media(max-width: 900px){
    .case-grid {
        grid-template-columns: 1fr;
    }

    .logo span {
        font-size: 28px;
    }
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
<div class="nav-container">

<div class="logo">
<img src="logo.png" alt="Logo">

<div class="logo-text">
    <span>Via Clara</span>
    <div class="logo-sub">Clear Path</div>
</div>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="case-studies.html">Case Studies</a></li>
<li><a href="blog.html">Resources</a></li>
<li><a href="about.html">About</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>

</div>
</nav>

<!-- HEADER -->
<section class="page-header">
<h1>Case Studies</h1>
<p>Real transformations, measurable outcomes, lasting impact</p>
</section>

<!-- (rest of your content unchanged) -->

</body>
</html>
